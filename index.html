<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa de Parcelas</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #22263a;
      --border:   #2e3250;
      --accent:   #4f8ef7;
      --text:     #e8eaf0;
      --text2:    #8b90a8;
      --radius:   10px;

      --c-plana:     #1a9641;
      --c-suave:     #a6d96a;
      --c-moderada:  #f5c842;
      --c-fuerte:    #fd8d3c;
      --c-muyfuerte: #d7191c;
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* LAYOUT */
    #app { display: flex; height: 100vh; width: 100vw; }

    /* SIDEBAR */
    #sidebar {
      width: 320px; min-width: 320px; background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 1000; overflow: hidden;
    }

    #sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    #sidebar-header h1 {
      font-size: 16px; font-weight: 600; letter-spacing: .01em;
      color: var(--text); margin-bottom: 3px;
    }
    #sidebar-header p {
      font-size: 12px; color: var(--text2);
    }

    /* STATS */
    #stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .stat-box {
      background: var(--surface2); border-radius: var(--radius);
      padding: 10px 12px; border: 1px solid var(--border);
    }
    .stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
    .stat-val { font-size: 20px; font-weight: 600; color: var(--accent); font-family: 'DM Mono', monospace; }
    .stat-unit { font-size: 10px; color: var(--text2); font-family: 'DM Mono', monospace; }

    /* LEYENDA */
    #legend {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .legend-title {
      font-size: 11px; color: var(--text2); text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: 8px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 8px; border-radius: 6px; cursor: pointer;
      transition: background .15s;
    }
    .legend-item:hover { background: var(--surface2); }
    .legend-item.inactive { opacity: .35; }
    .legend-dot {
      width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,.15);
    }
    .legend-text { font-size: 12px; color: var(--text); }
    .legend-count {
      margin-left: auto; font-size: 11px; color: var(--text2);
      font-family: 'DM Mono', monospace;
    }

    /* LISTA PARCELAS */
    #parcel-list {
      flex: 1; overflow-y: auto; padding: 8px;
    }
    #parcel-list::-webkit-scrollbar { width: 4px; }
    #parcel-list::-webkit-scrollbar-track { background: transparent; }
    #parcel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .list-title {
      font-size: 11px; color: var(--text2); text-transform: uppercase;
      letter-spacing: .06em; padding: 6px 8px 4px;
    }

    .parcel-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 12px; margin-bottom: 6px;
      cursor: pointer; transition: border-color .15s, background .15s;
    }
    .parcel-card:hover { border-color: var(--accent); background: #1e2236; }
    .parcel-card.selected { border-color: var(--accent); background: #1e2236; }
    .pc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .pc-id { font-size: 12px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--accent); }
    .pc-badge {
      font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500;
      border: 1px solid transparent;
    }
    .pc-owner { font-size: 12px; color: var(--text); margin-bottom: 2px; }
    .pc-area { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; }

    /* MAPA */
    #map { flex: 1; }

    /* POPUP */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      box-shadow: 0 8px 32px rgba(0,0,0,.5) !important;
      color: var(--text) !important;
      padding: 0 !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-close-button { color: var(--text2) !important; top: 8px !important; right: 10px !important; font-size: 16px !important; }
    .leaflet-popup-content { margin: 0 !important; width: auto !important; }

    .popup-inner { padding: 16px 18px; min-width: 220px; }
    .popup-id { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; margin-bottom: 4px; }
    .popup-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
    .popup-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); }
    .popup-row:last-child { border-bottom: none; }
    .popup-label { font-size: 11px; color: var(--text2); }
    .popup-val { font-size: 12px; color: var(--text); font-weight: 500; font-family: 'DM Mono', monospace; }

    /* SEARCH */
    #search-wrap { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    #search {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; padding: 7px 12px; font-size: 13px;
      color: var(--text); font-family: 'DM Sans', sans-serif; outline: none;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text2); }

    /* BASEMAP TOGGLE */
    #basemap-btn {
      position: absolute; bottom: 30px; right: 14px; z-index: 999;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 8px 14px;
      font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: border-color .15s;
    }
    #basemap-btn:hover { border-color: var(--accent); }

    @media (max-width: 640px) {
      #sidebar { width: 100%; min-width: unset; height: 45vh; border-right: none; border-bottom: 1px solid var(--border); }
      #app { flex-direction: column; }
      #map { flex: 1; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>📍 Catastro de Parcelas</h1>
      <p id="subtitle">Cargando datos...</p>
    </div>

    <div id="search-wrap">
      <input id="search" type="text" placeholder="Buscar por clave, propietario, dirección..." />
    </div>

    <div id="stats">
      <div class="stat-box">
        <div class="stat-label">Total parcelas</div>
        <div class="stat-val" id="stat-total">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Área total</div>
        <div class="stat-val" id="stat-area">—</div>
        <div class="stat-unit">m²</div>
      </div>
    </div>

    <div id="legend">
      <div class="legend-title">Clasificación de pendiente</div>
      <div id="legend-items"></div>
    </div>

    <div id="parcel-list">
      <div class="list-title">Parcelas</div>
      <div id="cards"></div>
    </div>
  </div>

  <!-- MAPA -->
  <div id="map"></div>
  <button id="basemap-btn" onclick="toggleBasemap()">🛰 Cambiar mapa base</button>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ============================================================
//  CONFIGURACIÓN DE PENDIENTE
// ============================================================
const CLASES = [
  { key: "Plana",      label: "Plana (0–5%)",       color: "#1a9641", border: "#0f5c26" },
  { key: "Suave",      label: "Suave (5–15%)",       color: "#a6d96a", border: "#6aaa1e" },
  { key: "Moderada",   label: "Moderada (15–30%)",   color: "#f5c842", border: "#c49a00" },
  { key: "Fuerte",     label: "Fuerte (30–45%)",     color: "#fd8d3c", border: "#c45a00" },
  { key: "Muy fuerte", label: "Muy fuerte (>45%)",   color: "#d7191c", border: "#8b0000" },
];

// ── Nombres de campos de tu GeoJSON ──────────────────────────
const CAMPO_ID      = "CLAVECAT";       // identificador único
const CAMPO_MAPA    = "MAPA";           // código de mapa catastral
const CAMPO_OWNER   = "PAR_PROP";       // propietario
const CAMPO_AREA    = "PAR_AREA_C";     // área en m²
const CAMPO_DIR     = "PAR_DIRECC";     // dirección
const CAMPO_TEXT    = "TEXT";           // número de parcela
const CAMPO_PEND_MEAN = "PEND_mean";    // pendiente media  (numérico)
const CAMPO_PEND_MIN  = "PEND_min";     // pendiente mínima (numérico)
const CAMPO_PEND_MAX  = "PEND_max";     // pendiente máxima (numérico)

// ============================================================
//  INICIALIZAR MAPA
// ============================================================
const map = L.map('map', { zoomControl: false });
L.control.zoom({ position: 'topright' }).addTo(map);

const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 20
});
const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: '© Esri World Imagery', maxZoom: 20
});
osmLayer.addTo(map);
let satelite = false;
function toggleBasemap() {
  if (satelite) { map.removeLayer(satLayer); osmLayer.addTo(map); }
  else          { map.removeLayer(osmLayer); satLayer.addTo(map); }
  satelite = !satelite;
}

// ============================================================
//  ESTADO
// ============================================================
let allFeatures   = [];
let geoLayer      = null;
let selectedId    = null;
let activeFilters = new Set(CLASES.map(c => c.key));

// ============================================================
//  COLOR POR CLASE
// ============================================================
function getClase(props) {
  // Clasifica automáticamente por valor numérico de PEND_mean
  const val = parseFloat(props[CAMPO_PEND_MEAN]);
  if (isNaN(val)) return null;
  if (val <  5)  return CLASES[0]; // Plana
  if (val < 15)  return CLASES[1]; // Suave
  if (val < 30)  return CLASES[2]; // Moderada
  if (val < 45)  return CLASES[3]; // Fuerte
  return CLASES[4];                // Muy fuerte
}
function styleFeature(feat) {
  const cl = getClase(feat.properties);
  return {
    fillColor:   cl ? cl.color  : "#888",
    fillOpacity: 0.7,
    color:       cl ? cl.border : "#555",
    weight: 1.5,
  };
}

// ============================================================
//  POPUP
// ============================================================
function makePopup(p) {
  const cl = getClase(p);
  const claseLabel = cl ? cl.label : "Sin datos";
  const claseColor = cl ? cl.color : "#888";
  const pendMean = parseFloat(p[CAMPO_PEND_MEAN]);
  const pendMin  = parseFloat(p[CAMPO_PEND_MIN]);
  const pendMax  = parseFloat(p[CAMPO_PEND_MAX]);
  // Limpiar nombre propietario (quitar parte entre paréntesis)
  const propFull = p[CAMPO_OWNER] || "Sin propietario";
  const propClean = propFull.replace(/\(.*?\)/g, "").trim();

  return `
    <div class="popup-inner">
      <div class="popup-id">Parcela ${p[CAMPO_TEXT]||"—"} · ${p[CAMPO_MAPA]||""}</div>
      <div class="popup-name">${propClean}</div>
      <div class="popup-row">
        <span class="popup-label">Clave catastral</span>
        <span class="popup-val" style="font-size:10px;">${p[CAMPO_ID]||"—"}</span>
      </div>
      <div class="popup-row">
        <span class="popup-label">Área</span>
        <span class="popup-val">${isNaN(p[CAMPO_AREA]) ? "—" : Number(p[CAMPO_AREA]).toLocaleString("es",{maximumFractionDigits:1})} m²</span>
      </div>
      <div class="popup-row">
        <span class="popup-label">Pendiente media</span>
        <span class="popup-val" style="color:${claseColor};">${isNaN(pendMean) ? "—" : pendMean.toFixed(1) + "%"}</span>
      </div>
      <div class="popup-row">
        <span class="popup-label">Pendiente min / max</span>
        <span class="popup-val">${isNaN(pendMin) ? "—" : pendMin.toFixed(1)}% / ${isNaN(pendMax) ? "—" : pendMax.toFixed(1)}%</span>
      </div>
      <div class="popup-row">
        <span class="popup-label">Clasificación</span>
        <span class="popup-val" style="color:${claseColor};">${claseLabel}</span>
      </div>
      <div class="popup-row" style="border-bottom:none;">
        <span class="popup-label" style="font-size:10px;line-height:1.4;">${p[CAMPO_DIR]||""}</span>
      </div>
    </div>`;
}

// ============================================================
//  BADGE COLOR
// ============================================================
function badgeStyle(props) {
  const cl = getClase(props);
  if (!cl) return "";
  return `background:${cl.color}22; color:${cl.color}; border-color:${cl.color}55;`;
}

// ============================================================
//  RENDERIZAR CAPA GEOJSON
// ============================================================
function renderLayer(features) {
  if (geoLayer) map.removeLayer(geoLayer);

  geoLayer = L.geoJSON({ type:"FeatureCollection", features }, {
    style: styleFeature,
    onEachFeature(feat, layer) {
      const p = feat.properties;
      layer.bindPopup(makePopup(p), { maxWidth: 280 });
      layer.on({
        mouseover(e) {
          e.target.setStyle({ fillOpacity: 0.92, weight: 2.5 });
        },
        mouseout(e) {
          if (p[CAMPO_ID] !== selectedId) geoLayer.resetStyle(e.target);
        },
        click(e) {
          selectedId = p[CAMPO_ID];
          highlightCard(selectedId);
        }
      });
    }
  }).addTo(map);
}

// ============================================================
//  TARJETAS LATERALES
// ============================================================
function renderCards(features) {
  const container = document.getElementById('cards');
  container.innerHTML = "";
  features.forEach(feat => {
    const p = feat.properties;
    const div = document.createElement('div');
    div.className = 'parcel-card';
    div.dataset.id = p[CAMPO_ID];
    const cl2 = getClase(p);
    const propShort = (p[CAMPO_OWNER]||"Sin propietario").replace(/[(].*?[)]/g,"").trim().split(",").slice(0,2).join(", ");
    div.innerHTML = `
      <div class="pc-top">
        <span class="pc-id">Parc. ${p[CAMPO_TEXT]||"—"}</span>
        <span class="pc-badge" style="${badgeStyle(p)}">${cl2 ? cl2.label.split(" ")[0] : "—"}</span>
      </div>
      <div class="pc-owner">${propShort}</div>
      <div class="pc-area">${Number(p[CAMPO_AREA]||0).toLocaleString("es",{maximumFractionDigits:1})} m² · Pend. ${parseFloat(p[CAMPO_PEND_MEAN]).toFixed(1)}%</div>
    `;
    div.addEventListener('click', () => {
      selectedId = p[CAMPO_ID];
      highlightCard(selectedId);
      // Volar al polígono
      geoLayer.eachLayer(l => {
        if (l.feature.properties[CAMPO_ID] === selectedId) {
          map.fitBounds(l.getBounds(), { maxZoom: 17, padding: [40,40] });
          l.openPopup();
        }
      });
    });
    container.appendChild(div);
  });
}

function highlightCard(id) {
  document.querySelectorAll('.parcel-card').forEach(c => {
    c.classList.toggle('selected', c.dataset.id === id);
  });
}

// ============================================================
//  LEYENDA INTERACTIVA
// ============================================================
function renderLegend(features) {
  const counts = {};
  CLASES.forEach(c => counts[c.key] = 0);
  features.forEach(f => {
    const cl = getClase(f.properties);
    if (cl) counts[cl.key] = (counts[cl.key]||0) + 1;
  });

  const container = document.getElementById('legend-items');
  container.innerHTML = "";
  CLASES.forEach(cl => {
    const item = document.createElement('div');
    item.className = 'legend-item' + (activeFilters.has(cl.key) ? '' : ' inactive');
    item.innerHTML = `
      <div class="legend-dot" style="background:${cl.color}; border-color:${cl.border};"></div>
      <span class="legend-text">${cl.label}</span>
      <span class="legend-count">${counts[cl.key]||0}</span>
    `;
    item.addEventListener('click', () => {
      if (activeFilters.has(cl.key)) activeFilters.delete(cl.key);
      else activeFilters.add(cl.key);
      applyFilters();
    });
    container.appendChild(item);
  });
}

// ============================================================
//  FILTROS Y BÚSQUEDA
// ============================================================
function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const filtered = allFeatures.filter(f => {
    const p = f.properties;
    const cl = getClase(p);
    if (cl && !activeFilters.has(cl.key)) return false;
    if (q) {
      const haystack = [p[CAMPO_ID], p[CAMPO_OWNER], p[CAMPO_TEXT], p[CAMPO_MAPA], p[CAMPO_DIR]]
        .filter(Boolean).join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
  renderLayer(filtered);
  renderCards(filtered);
  renderLegend(allFeatures); // siempre sobre total
  updateStats(filtered);
}

function updateStats(features) {
  document.getElementById('stat-total').textContent = features.length;
  const totalArea = features.reduce((s, f) => s + (f.properties[CAMPO_AREA]||0), 0);
  document.getElementById('stat-area').textContent =
    totalArea >= 10000
      ? (totalArea/10000).toLocaleString('es',{maximumFractionDigits:2}) + " ha"
      : totalArea.toLocaleString('es',{maximumFractionDigits:0});
  if (totalArea >= 10000)
    document.querySelector('.stat-unit').textContent = "ha";
}

document.getElementById('search').addEventListener('input', applyFilters);

// ============================================================
//  CARGAR GEOJSON
// ============================================================
fetch('parcelas.geojson')
  .then(r => r.json())
  .then(data => {
    allFeatures = data.features || [];

    document.getElementById('subtitle').textContent =
      `${allFeatures.length} parcelas cargadas`;

    renderLayer(allFeatures);
    renderCards(allFeatures);
    renderLegend(allFeatures);
    updateStats(allFeatures);

    if (geoLayer) map.fitBounds(geoLayer.getBounds(), { padding: [20,20] });
  })
  .catch(err => {
    document.getElementById('subtitle').textContent = "Error cargando datos";
    console.error("Error cargando parcelas.geojson:", err);
  });
</script>
</body>
</html>
